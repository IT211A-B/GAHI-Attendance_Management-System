name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore Attendance_Management_System/Attendance_Management_System.slnx

      - name: Build (Release)
        run: dotnet build Attendance_Management_System/Attendance_Management_System.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Attendance_Management_System/tests/Attendance_Management_System.Tests/Attendance_Management_System.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish Web App
        run: dotnet publish Attendance_Management_System/Attendance_Management_System/Attendance_Management_System.csproj --configuration Release --no-build --output ./publish

      - name: Upload Published Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-publish
          path: ./publish

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Trigger Render Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set; skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
