services:
  - type: web
    name: attendance-management-system
    runtime: dotnet
    rootDir: Attendance_Management_System/Attendance_Management_System
    buildCommand: dotnet restore Attendance_Management_System.csproj; dotnet publish Attendance_Management_System.csproj -c Release -o out
    startCommand: cd out; dotnet Attendance_Management_System.dll
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DOTNET_RUNNING_IN_CONTAINER
        value: true
      - key: Logging__LogLevel__Default
        value: Warning
      - key: CookieSettings__SecurePolicy
        value: Always
      - key: ConnectionStrings__Default
        sync: false
      - key: EmailSettings__PublicBaseUrl
        value: https://donbosco-attendance-management-system.onrender.com
      - key: AttendanceQrSettings__SigningKey
        sync: false
      - key: EmailSettings__Host
        value: smtp.gmail.com
      - key: EmailSettings__Port
        value: 587
      - key: EmailSettings__Username
        sync: false
      - key: EmailSettings__Password
        sync: false
      - key: EmailSettings__FromName
        value: Don Bosco Attendance
      - key: EmailSettings__UseSsl
        value: false
